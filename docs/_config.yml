# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site title and description
title:              DNS Security TXT
description:        A standard allowing organizations to nominate security contact points and policies via DNS TXT records.
lang:               en


# Default footer image settings
footer:
    copyright:      Copyright 2018-2021 disclose.io

# Disqus comments shortname, requires Disqus account https://disqus.com/
disqus:
    shortname:      disclose_io

# Google Analytics: intentionally UNSET. The theme's built-in analytics uses legacy
# analytics.js (ga.js), which does NOT work with GA4 IDs. GA4 (G-GLJF09Y0DB) is injected
# via _includes/head-custom.html instead. (UA-143424917-10 was Universal Analytics, dead since 2023-07.)
# google_analytics:

gems:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-gist
  - jekyll-avatar
  - jekyll-redirect-from
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules

include: 
  - ".well-known"
